kind = "web"
previewPath = "/"
title = "Orvek Foundry"
version = "1.0.0"
id = "artifacts/orvek-foundry"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22958

[services.development]
run = "pnpm --filter @workspace/orvek-foundry run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orvek-foundry", "run", "build" ]
publicDir = "artifacts/orvek-foundry/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22958"
BASE_PATH = "/"
